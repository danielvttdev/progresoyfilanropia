<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="neutral-grad" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="neutral-grad-subtle" x1="40" y1="10" x2="40" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#475569"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="80" height="80" rx="20" fill="url(#neutral-grad)" opacity="0.06"/>
  
  <!-- Commitment Symbol: Seedling growing from supporting hands -->
  <!-- Hands -->
  <path d="M22 52c6-3 12-2 18 1 6-3 12-4 18-1" stroke="url(#neutral-grad)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M28 58c4 3 8 4 12 4s8-1 12-4l4-8c1-2-1-4-3-3l-13 6-13-6c-2-1-4 1-3 3l4 8z" fill="url(#neutral-grad-subtle)" opacity="0.3"/>
  <path d="M28 58c4 3 8 4 12 4s8-1 12-4" stroke="url(#neutral-grad)" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Seedling stem and leaves -->
  <path d="M40 50V30" stroke="url(#neutral-grad)" stroke-width="3" stroke-linecap="round"/>
  <path d="M40 38c-3-3-8-3-10 0 0 4 5 7 10 7M40 34c3-3 8-3 10 0 0 4-5 7-10 7" fill="url(#neutral-grad-subtle)"/>
  <path d="M40 38c-3-3-8-3-10 0 0 4 5 7 10 7M40 34c3-3 8-3 10 0 0 4-5 7-10 7" stroke="url(#neutral-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Little bud on top -->
  <circle cx="40" cy="28" r="2" fill="white" stroke="url(#neutral-grad)" stroke-width="1.5"/>
</svg>
