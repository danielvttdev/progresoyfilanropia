  <!-- Respect handshake or heart motif inside main bubble -->
  <path d="M47.5 31.5c.4-.8 1.2-1.3 2.2-1.3 1.4 0 2.5 1 2.5 2.4 0 1.9-2.7 4-4.7 5.2-2-1.2-4.7-3.3-4.7-5.2 0-1.4 1.1-2.4 2.5-2.4.9 0 1.7.5 2.2 1.3z" fill="url(#neutral-grad)"/>
