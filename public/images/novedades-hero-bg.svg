<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Base institutional dark blue -->
    <radialGradient id="orb1" cx="20%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#3B5FD4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3B5FD4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="80%" cy="80%" r="45%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="60%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle dot grid (news = information particles) -->
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="white" fill-opacity="0.15"/>
    </pattern>

    <!-- Newspaper column gradient fade -->
    <linearGradient id="colFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="1920" height="600" fill="#1B3A7A"/>

  <!-- Orbs -->
  <rect width="1920" height="600" fill="url(#orb1)"/>
  <rect width="1920" height="600" fill="url(#orb2)"/>
  <rect width="1920" height="600" fill="url(#orb3)"/>

  <!-- Dot grid -->
  <rect width="1920" height="600" fill="url(#dots)"/>

  <!-- Newspaper columns on left (editorial = print) -->
  <g opacity="0.7" aria-hidden="true">
    <rect x="80" y="100" width="220" height="400" fill="url(#colFade)" rx="2"/>

    <!-- Editorial text lines (abstract) -->
    <g fill="white" fill-opacity="0.18">
      <rect x="100" y="130" width="180" height="3" rx="1.5"/>
      <rect x="100" y="145" width="140" height="3" rx="1.5"/>
      <rect x="100" y="175" width="180" height="2" rx="1"/>
      <rect x="100" y="185" width="180" height="2" rx="1"/>
      <rect x="100" y="195" width="160" height="2" rx="1"/>
      <rect x="100" y="205" width="180" height="2" rx="1"/>
      <rect x="100" y="215" width="120" height="2" rx="1"/>

      <rect x="100" y="245" width="180" height="3" rx="1.5"/>
      <rect x="100" y="260" width="100" height="3" rx="1.5"/>
      <rect x="100" y="285" width="180" height="2" rx="1"/>
      <rect x="100" y="295" width="170" height="2" rx="1"/>
      <rect x="100" y="305" width="180" height="2" rx="1"/>
      <rect x="100" y="315" width="140" height="2" rx="1"/>
      <rect x="100" y="325" width="180" height="2" rx="1"/>

      <rect x="100" y="355" width="180" height="3" rx="1.5"/>
      <rect x="100" y="370" width="120" height="3" rx="1.5"/>
      <rect x="100" y="395" width="180" height="2" rx="1"/>
      <rect x="100" y="405" width="160" height="2" rx="1"/>
      <rect x="100" y="415" width="180" height="2" rx="1"/>
      <rect x="100" y="425" width="100" height="2" rx="1"/>

      <rect x="100" y="455" width="180" height="3" rx="1.5"/>
      <rect x="100" y="470" width="80" height="3" rx="1.5"/>
    </g>
  </g>

  <!-- Signal / broadcast arcs on right (news = communication) -->
  <g opacity="0.6" stroke="white" stroke-opacity="0.2" fill="none" aria-hidden="true">
    <circle cx="1600" cy="300" r="100"/>
    <circle cx="1600" cy="300" r="160"/>
    <circle cx="1600" cy="300" r="220"/>
    <circle cx="1600" cy="300" r="280"/>
  </g>

  <!-- Central broadcasting point -->
  <g aria-hidden="true">
    <circle cx="1600" cy="300" r="6" fill="white" fill-opacity="0.8"/>
    <circle cx="1600" cy="300" r="14" fill="white" fill-opacity="0.3"/>
    <circle cx="1600" cy="300" r="24" fill="white" fill-opacity="0.15"/>
  </g>

  <!-- Floating "headline cards" abstract -->
  <g aria-hidden="true">
    <!-- Card 1 -->
    <rect x="900" y="120" width="280" height="120" rx="8" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
    <rect x="920" y="140" width="240" height="6" rx="3" fill="white" fill-opacity="0.3"/>
    <rect x="920" y="156" width="180" height="6" rx="3" fill="white" fill-opacity="0.3"/>
    <rect x="920" y="185" width="240" height="3" rx="1.5" fill="white" fill-opacity="0.18"/>
    <rect x="920" y="195" width="220" height="3" rx="1.5" fill="white" fill-opacity="0.18"/>
    <rect x="920" y="205" width="240" height="3" rx="1.5" fill="white" fill-opacity="0.18"/>
    <rect x="920" y="215" width="160" height="3" rx="1.5" fill="white" fill-opacity="0.18"/>

    <!-- Card 2 (slightly rotated, behind) -->
    <g transform="rotate(-4 1100 380)">
      <rect x="980" y="320" width="260" height="100" rx="8" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
      <rect x="1000" y="340" width="220" height="5" rx="2.5" fill="white" fill-opacity="0.25"/>
      <rect x="1000" y="354" width="160" height="5" rx="2.5" fill="white" fill-opacity="0.25"/>
      <rect x="1000" y="380" width="220" height="3" rx="1.5" fill="white" fill-opacity="0.15"/>
      <rect x="1000" y="390" width="200" height="3" rx="1.5" fill="white" fill-opacity="0.15"/>
      <rect x="1000" y="400" width="140" height="3" rx="1.5" fill="white" fill-opacity="0.15"/>
    </g>
  </g>

  <!-- Soft atmospheric circles -->
  <circle cx="200" cy="150" r="220" fill="#3B5FD4" fill-opacity="0.1"/>
  <circle cx="1700" cy="500" r="200" fill="#818CF8" fill-opacity="0.06"/>
</svg>
