<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Base institutional dark blue -->
    <radialGradient id="orb1" cx="80%" cy="25%" r="50%">
      <stop offset="0%" stop-color="#3B5FD4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3B5FD4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="15%" cy="75%" r="45%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="55%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0"/>
    </radialGradient>

    <!-- Architectural grid pattern (projects = structure) -->
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>

    <!-- Subtle blueprint / architectural columns -->
    <linearGradient id="columnFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="1920" height="600" fill="#1B3A7A"/>

  <!-- Orbs -->
  <rect width="1920" height="600" fill="url(#orb1)"/>
  <rect width="1920" height="600" fill="url(#orb2)"/>
  <rect width="1920" height="600" fill="url(#orb3)"/>

  <!-- Grid -->
  <rect width="1920" height="600" fill="url(#grid)"/>

  <!-- Architectural columns (suggesting structure, pillars, foundations) -->
  <g opacity="0.6" aria-hidden="true">
    <rect x="240" y="80" width="2" height="440" fill="url(#columnFade)"/>
    <rect x="280" y="120" width="2" height="360" fill="url(#columnFade)"/>
    <rect x="320" y="80" width="2" height="440" fill="url(#columnFade)"/>
    <rect x="360" y="160" width="2" height="280" fill="url(#columnFade)"/>

    <rect x="1560" y="80" width="2" height="440" fill="url(#columnFade)"/>
    <rect x="1600" y="120" width="2" height="360" fill="url(#columnFade)"/>
    <rect x="1640" y="80" width="2" height="440" fill="url(#columnFade)"/>
    <rect x="1680" y="160" width="2" height="280" fill="url(#columnFade)"/>
  </g>

  <!-- Architectural "buildings" silhouette on right (geometric blocks = projects) -->
  <g opacity="0.7" aria-hidden="true">
    <rect x="1100" y="200" width="120" height="320" fill="white" fill-opacity="0.08" rx="2"/>
    <rect x="1240" y="140" width="140" height="380" fill="white" fill-opacity="0.1" rx="2"/>
    <rect x="1400" y="240" width="100" height="280" fill="white" fill-opacity="0.08" rx="2"/>
    <rect x="1520" y="180" width="120" height="340" fill="white" fill-opacity="0.1" rx="2"/>

    <!-- Building window hints -->
    <g fill="white" fill-opacity="0.25">
      <rect x="1116" y="220" width="8" height="8"/>
      <rect x="1136" y="220" width="8" height="8"/>
      <rect x="1156" y="220" width="8" height="8"/>
      <rect x="1116" y="240" width="8" height="8"/>
      <rect x="1156" y="240" width="8" height="8"/>
      <rect x="1136" y="260" width="8" height="8"/>

      <rect x="1256" y="160" width="8" height="8"/>
      <rect x="1276" y="160" width="8" height="8"/>
      <rect x="1296" y="160" width="8" height="8"/>
      <rect x="1316" y="160" width="8" height="8"/>
      <rect x="1336" y="160" width="8" height="8"/>
      <rect x="1356" y="160" width="8" height="8"/>
      <rect x="1256" y="180" width="8" height="8"/>
      <rect x="1296" y="180" width="8" height="8"/>
      <rect x="1336" y="180" width="8" height="8"/>
    </g>
  </g>

  <!-- Connecting lines (projects = connections) -->
  <g opacity="0.7" stroke="white" stroke-opacity="0.18" stroke-width="1" fill="none" aria-hidden="true">
    <line x1="320" y1="300" x2="1100" y2="200"/>
    <line x1="320" y1="300" x2="1240" y2="140"/>
    <line x1="320" y1="300" x2="1400" y2="240"/>
    <line x1="320" y1="300" x2="1520" y2="180"/>
  </g>

  <!-- Floating dots (impact markers) -->
  <g fill="white" aria-hidden="true">
    <circle cx="1100" cy="200" r="3" fill-opacity="0.6"/>
    <circle cx="1240" cy="140" r="3" fill-opacity="0.7"/>
    <circle cx="1400" cy="240" r="3" fill-opacity="0.6"/>
    <circle cx="1520" cy="180" r="3" fill-opacity="0.7"/>
    <circle cx="320" cy="300" r="4" fill-opacity="0.8"/>
  </g>

  <!-- Soft atmospheric circles -->
  <circle cx="1500" cy="120" r="220" fill="#3B5FD4" fill-opacity="0.1"/>
  <circle cx="280" cy="500" r="180" fill="#818CF8" fill-opacity="0.06"/>
</svg>
